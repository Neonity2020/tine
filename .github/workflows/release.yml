# Build Tine installers for Linux, macOS (universal), and Windows and attach
# them to a draft GitHub Release. Triggered by pushing a version tag:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# …or run it manually from the Actions tab (workflow_dispatch) to smoke-test the
# build matrix without cutting a release.
#
# Signing: macOS/Windows installers are UNSIGNED until you add the secrets noted
# below. Unsigned builds still run, but Gatekeeper (macOS) and SmartScreen
# (Windows) warn the user. See the comments on the signing env vars.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # create the release + upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--features custom-protocol"
            rust-targets: ""
          - platform: macos-latest
            # one universal binary that runs on both Apple Silicon and Intel
            args: "--target universal-apple-darwin --features custom-protocol"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: "--features custom-protocol"
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf \
            build-essential curl wget file libssl-dev libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          # Cargo workspace is the repo ROOT (target/ lives there, not src-tauri/)
          workspaces: ". -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS/Windows builds are UNSIGNED for now. Do NOT set the APPLE_*
          # signing env vars here while the secrets are empty — tauri-action sees
          # an (empty) APPLE_CERTIFICATE as "signing requested" and fails on
          # `security import`. To enable notarized macOS builds later, add these
          # repo secrets AND re-add the matching env lines:
          #   APPLE_CERTIFICATE (base64 .p12), APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tine ${{ github.ref_name }}"
          releaseBody: "Download an installer for your platform below. macOS/Windows builds are currently unsigned (right-click → Open on macOS; More info → Run anyway on Windows)."
          # Auto-publish: each tagged release goes public on its own, no manual
          # step. (The v0.1.0 release was cut as a draft before this flip, so that
          # ONE needs a manual "Publish release"; everything after is automatic.)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
